name: GitHub Actions Demo
on:
  push:
    paths-ignore:
    - .github
    branches:
    - main
  pull_request:
    branches:
    - main
  schedule:
    - cron: "15 6 * * 0"
  workflow_dispatch:

jobs:
  Build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Echo event
      run: |
        echo ${{ github.event_name }}
        echo ${{ github.ref_name }}
        ls
      
  
